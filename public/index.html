<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RealVision - Deepfake Detection Demo</title>
    <style>
      :root {
        --bg: #0b1220;
        --surface: #111a2e;
        --surface-border: rgba(96, 165, 250, 0.2);
        --text: #e5edff;
        --muted: #9fb2d9;
        --primary: #3b82f6;
        --primary-hover: #2563eb;
        --danger-bg: #2a1320;
        --danger-border: #7f1d3a;
        --success-bg: #10243a;
        --success-border: #1d4ed8;
      }

      body {
        font-family: Inter, "Segoe UI", Arial, Helvetica, sans-serif;
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px 16px;
        color: var(--text);
        background:
          radial-gradient(1200px 600px at 20% -10%, rgba(59, 130, 246, 0.22), transparent 55%),
          radial-gradient(1000px 500px at 100% 0%, rgba(37, 99, 235, 0.14), transparent 45%),
          var(--bg);
      }

      .container {
        width: 100%;
        max-width: 640px;
      }

      h1 {
        margin: 0;
        font-size: 28px;
        letter-spacing: -0.3px;
        color: #f8fbff;
      }

      .subtitle {
        margin-top: 10px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.5;
      }

      .card {
        margin-top: 18px;
        background: var(--surface);
        border: 1px solid var(--surface-border);
        border-radius: 16px;
        padding: 22px;
        box-shadow: 0 14px 38px rgba(2, 8, 23, 0.45);
      }

      label {
        display: block;
        font-weight: 600;
        margin: 12px 0 8px;
        color: #d8e4ff;
      }

      input[type="file"] {
        width: 100%;
        padding: 10px;
        border: 1px solid rgba(147, 197, 253, 0.34);
        border-radius: 10px;
        background: #0b1428;
        color: #dbeafe;
        box-sizing: border-box;
      }

      input[type="file"]::file-selector-button {
        margin-right: 12px;
        padding: 8px 10px;
        border: 1px solid rgba(147, 197, 253, 0.45);
        border-radius: 8px;
        background: #0f1d39;
        color: #dbeafe;
        cursor: pointer;
      }

      button {
        margin-top: 14px;
        padding: 11px 14px;
        border: 1px solid var(--primary);
        background: var(--primary);
        color: #f8fbff;
        border-radius: 10px;
        cursor: pointer;
        width: 100%;
        font-weight: 700;
        transition: background 0.18s ease, border-color 0.18s ease;
      }

      button:disabled {
        opacity: 0.62;
        cursor: not-allowed;
      }

      button:not(:disabled):hover {
        background: var(--primary-hover);
        border-color: var(--primary-hover);
      }

      .status {
        margin-top: 12px;
        padding: 12px;
        border-radius: 12px;
        background: #0d1931;
        border: 1px solid rgba(147, 197, 253, 0.28);
        color: #dbeafe;
        display: none;
      }

      .status strong {
        font-weight: 800;
      }

      .error {
        background: var(--danger-bg);
        border: 1px solid var(--danger-border);
        color: #fecdd3;
      }

      .result {
        background: var(--success-bg);
        border: 1px solid var(--success-border);
        color: #dbeafe;
      }

      .muted {
        color: var(--muted);
        font-size: 14px;
      }

      .debug {
        margin-top: 10px;
        color: #9fb2d9;
        font-size: 13px;
      }

      .row {
        display: flex;
        gap: 16px;
        margin-top: 8px;
      }

      @media (max-width: 520px) {
        .row {
          flex-direction: column;
          gap: 10px;
        }
      }

      .pill {
        border: 1px solid rgba(147, 197, 253, 0.3);
        border-radius: 999px;
        padding: 6px 10px;
        background: #0d1931;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>RealVision Deepfake Detector</h1>
      <div class="subtitle">Upload a video to receive a demo prediction and confidence score (mock output)</div>
      <div class="card">
        <form id="predictForm">
          <label for="videoInput">Choose a video</label>
          <input id="videoInput" name="video" type="file" accept="video/*" />
          <button id="submitBtn" type="submit">Upload & Predict</button>
        </form>

        <div id="status" class="status"></div>
      </div>
    </div>

    <script>
      /** POST target: same origin when served from the app; otherwise hit the local API (file:// or Live Server). */
      function getPredictUrl() {
        if (window.location.protocol === 'file:') {
          return 'http://localhost:3000/api/predict';
        }
        var h = window.location.hostname;
        var p = window.location.port;
        if ((h === 'localhost' || h === '127.0.0.1') && p && p !== '3000') {
          return 'http://localhost:3000/api/predict';
        }
        return '/api/predict';
      }

      const form = document.getElementById('predictForm');
      const videoInput = document.getElementById('videoInput');
      const submitBtn = document.getElementById('submitBtn');
      const statusEl = document.getElementById('status');

      function setStatus({ kind, message, prediction, confidence, debug }) {
        statusEl.style.display = 'block';
        statusEl.classList.remove('error', 'result');
        if (kind) statusEl.classList.add(kind);

        if (prediction !== undefined && confidence !== undefined) {
          statusEl.innerHTML =
            '<div>' +
            '<strong>' + message + '</strong>' +
            '</div>' +
            '<div class="row">' +
            '<div class="pill"><strong>Prediction:</strong> ' + prediction + '</div>' +
            '<div class="pill"><strong>Confidence:</strong> ' + confidence + '</div>' +
            '</div>' +
            (debug ? '<div class="debug">Debug: ' + debug + '</div>' : '');
        } else {
          statusEl.textContent = message || '';
          if (debug) {
            statusEl.innerHTML = statusEl.innerHTML + '<div class="debug">Debug: ' + debug + '</div>';
          }
        }
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const file = videoInput.files && videoInput.files[0];
        if (!file) {
          setStatus({ kind: 'error', message: 'Please select a video file first.' });
          return;
        }

        submitBtn.disabled = true;
        setStatus({ kind: null, message: 'Loading... Please wait.' });

        try {
          const formData = new FormData();
          // backend expects field name: "video"
          formData.append('video', file);

          const resp = await fetch(getPredictUrl(), {
            method: 'POST',
            body: formData,
          });

          const data = await resp.json().catch(() => ({}));

          if (!resp.ok) {
            setStatus({
              kind: 'error',
              message: data.message || 'Upload/Inference failed.',
              debug: data.debug,
            });
            return;
          }

          setStatus({
            kind: 'result',
            message: data.message || 'Prediction successful',
            prediction: data.prediction,
            confidence: data.confidence,
          });
        } catch (err) {
          setStatus({
            kind: 'error',
            message: 'Request failed. Check your server logs and try again.',
          });
        } finally {
          submitBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
