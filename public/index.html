<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f172a" />
    <title>RealVision - Deepfake Detection Demo</title>
    <style>
      :root {
        --bg: #0f172a;
        --card: #1e293b;
        --border: rgba(148, 163, 184, 0.14);
        --border-hover: rgba(148, 163, 184, 0.22);
        --text: #f1f5f9;
        --text-secondary: #cbd5e1;
        --muted: #94a3b8;
        --accent-blue: #3b82f6;
        --accent-blue-hover: #2563eb;
        --accent-blue-muted: rgba(59, 130, 246, 0.15);
        --real: #10b981;
        --real-bg: rgba(16, 185, 129, 0.09);
        --real-border: rgba(16, 185, 129, 0.35);
        --fake: #ef4444;
        --fake-bg: rgba(239, 68, 68, 0.09);
        --fake-border: rgba(239, 68, 68, 0.4);
        --error-bg: rgba(239, 68, 68, 0.08);
        --radius-lg: 14px;
        --radius-md: 10px;
        --shadow-card: 0 1px 0 rgba(255, 255, 255, 0.04) inset, 0 12px 40px rgba(0, 0, 0, 0.35);
        --transition: 0.2s ease;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 48px 20px;
        color: var(--text);
        background-color: var(--bg);
        background-image: radial-gradient(
          ellipse 900px 480px at 50% -20%,
          rgba(59, 130, 246, 0.06),
          transparent 55%
        );
        line-height: 1.5;
      }

      .container {
        width: 100%;
        max-width: 800px;
      }

      .page-header {
        margin-bottom: 28px;
      }

      h1 {
        margin: 0;
        font-size: 1.625rem;
        font-weight: 650;
        letter-spacing: -0.02em;
        color: var(--text);
      }

      .subtitle {
        margin: 10px 0 0;
        color: var(--muted);
        font-size: 0.9375rem;
        max-width: 42ch;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 24px;
        box-shadow: var(--shadow-card);
        transition: border-color var(--transition), box-shadow var(--transition);
      }

      .card:hover {
        border-color: var(--border-hover);
      }

      .card + .card {
        margin-top: 16px;
      }

      label {
        display: block;
        font-weight: 600;
        font-size: 0.8125rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin: 0 0 10px;
        color: var(--text-secondary);
      }

      input[type='file'] {
        width: 100%;
        padding: 12px 14px;
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        background: rgba(15, 23, 42, 0.45);
        color: var(--text-secondary);
        font-size: 0.875rem;
        transition: border-color var(--transition), background var(--transition);
      }

      input[type='file']:hover {
        border-color: var(--border-hover);
        background: rgba(15, 23, 42, 0.65);
      }

      input[type='file']::file-selector-button {
        margin-right: 14px;
        padding: 8px 14px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: rgba(30, 41, 59, 0.9);
        color: var(--text-secondary);
        font-weight: 600;
        font-size: 0.8125rem;
        cursor: pointer;
        transition: border-color var(--transition), background var(--transition), color var(--transition);
      }

      input[type='file']::file-selector-button:hover {
        border-color: var(--border-hover);
        color: var(--text);
        background: rgba(51, 65, 85, 0.55);
      }

      input[type='file']:focus-visible {
        outline: 2px solid var(--accent-blue);
        outline-offset: 2px;
      }

      button {
        margin-top: 18px;
        padding: 12px 16px;
        border: 1px solid var(--accent-blue);
        background: var(--accent-blue);
        color: #fff;
        border-radius: var(--radius-md);
        cursor: pointer;
        width: 100%;
        font-weight: 600;
        font-size: 0.9375rem;
        transition: background var(--transition), border-color var(--transition), transform 0.15s ease,
          box-shadow var(--transition);
      }

      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      button:not(:disabled):hover {
        background: var(--accent-blue-hover);
        border-color: var(--accent-blue-hover);
        box-shadow: 0 6px 24px rgba(59, 130, 246, 0.25);
      }

      button:not(:disabled):active {
        transform: translateY(1px);
      }

      button:focus-visible {
        outline: 2px solid var(--accent-blue);
        outline-offset: 2px;
      }

      .status {
        display: none;
        animation: fadeIn 0.25s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(4px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .status strong {
        font-weight: 650;
      }

      .status-neutral {
        border-color: var(--border);
        background: var(--card);
        color: var(--text-secondary);
      }

      .error {
        border-color: var(--fake-border);
        background: var(--error-bg);
        color: #fecaca;
      }

      .result {
        border-width: 1px;
      }

      .result.result--real {
        border-color: var(--real-border);
        background: var(--real-bg);
        color: #ecfdf5;
      }

      .result.result--real .pill {
        border-color: rgba(16, 185, 129, 0.35);
        background: rgba(16, 185, 129, 0.1);
        color: #a7f3d0;
      }

      .result.result--fake {
        border-color: var(--fake-border);
        background: var(--fake-bg);
        color: #fef2f2;
      }

      .result.result--fake .pill {
        border-color: rgba(239, 68, 68, 0.4);
        background: rgba(239, 68, 68, 0.12);
        color: #fecaca;
      }

      .result.result--default {
        border-color: rgba(59, 130, 246, 0.35);
        background: var(--accent-blue-muted);
        color: var(--text-secondary);
      }

      .result.result--default .pill {
        border-color: var(--border);
        background: rgba(15, 23, 42, 0.35);
        color: var(--text-secondary);
      }

      .result-outcome {
        margin-bottom: 4px;
      }

      .result-badge {
        display: inline-block;
        font-size: 1.75rem;
        font-weight: 700;
        letter-spacing: -0.03em;
        padding: 12px 22px;
        border-radius: 12px;
        line-height: 1;
      }

      .result-badge--fake {
        color: #fecaca;
        background: rgba(239, 68, 68, 0.22);
        border: 1px solid rgba(239, 68, 68, 0.45);
      }

      .result-badge--real {
        color: #a7f3d0;
        background: rgba(16, 185, 129, 0.2);
        border: 1px solid rgba(16, 185, 129, 0.45);
      }

      .result-badge--default {
        color: var(--text-secondary);
        background: rgba(15, 23, 42, 0.45);
        border: 1px solid var(--border);
      }

      .result-explain {
        margin: 14px 0 0;
        font-size: 0.9375rem;
        line-height: 1.45;
        color: var(--muted);
      }

      .result.result--fake .result-explain {
        color: rgba(254, 202, 202, 0.85);
      }

      .result.result--real .result-explain {
        color: rgba(167, 243, 208, 0.88);
      }

      .confidence-block {
        margin-top: 22px;
      }

      .confidence-head {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
      }

      .result.result--fake .confidence-head {
        color: rgba(254, 202, 202, 0.75);
      }

      .result.result--real .confidence-head {
        color: rgba(167, 243, 208, 0.75);
      }

      .confidence-pct {
        font-size: 1.125rem;
        font-weight: 650;
        letter-spacing: -0.02em;
        color: var(--text);
        text-transform: none;
      }

      .result.result--fake .confidence-pct {
        color: #fecaca;
      }

      .result.result--real .confidence-pct {
        color: #ecfdf5;
      }

      .result.result--default .confidence-pct {
        color: var(--text-secondary);
      }

      .progress-track {
        margin-top: 10px;
        height: 8px;
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.55);
        overflow: hidden;
      }

      .progress-fill {
        height: 100%;
        border-radius: 999px;
        width: 0;
        transition: width 0.45s ease;
      }

      .progress-fill--fake {
        background: linear-gradient(90deg, #dc2626, #ef4444);
      }

      .progress-fill--real {
        background: linear-gradient(90deg, #059669, var(--real));
      }

      .progress-fill--default {
        background: linear-gradient(90deg, var(--accent-blue-hover), var(--accent-blue));
      }

      .xai-section {
        margin-top: 22px;
        padding-top: 20px;
        border-top: 1px solid rgba(148, 163, 184, 0.18);
      }

      .xai-title {
        margin: 0 0 10px;
        font-size: 0.8125rem;
        font-weight: 650;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        color: var(--muted);
      }

      .result.result--fake .xai-title {
        color: rgba(254, 202, 202, 0.85);
      }

      .result.result--real .xai-title {
        color: rgba(167, 243, 208, 0.85);
      }

      .xai-lead {
        margin: 0 0 14px;
        font-size: 0.9375rem;
        line-height: 1.55;
        color: var(--text-secondary);
      }

      .result.result--fake .xai-lead {
        color: rgba(254, 226, 226, 0.92);
      }

      .result.result--real .xai-lead {
        color: rgba(220, 252, 231, 0.92);
      }

      .xai-list {
        margin: 0;
        padding-left: 1.15rem;
        font-size: 0.875rem;
        line-height: 1.55;
        color: var(--muted);
      }

      .result.result--fake .xai-list {
        color: rgba(254, 202, 202, 0.82);
      }

      .result.result--real .xai-list {
        color: rgba(167, 243, 208, 0.85);
      }

      .xai-list li + li {
        margin-top: 8px;
      }

      .xai-label {
        margin: 16px 0 0;
        font-size: 0.6875rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
        opacity: 0.88;
      }

      .result-footer {
        margin-top: 20px;
        padding-top: 16px;
        border-top: 1px solid rgba(148, 163, 184, 0.18);
        font-size: 0.8125rem;
        color: var(--muted);
        line-height: 1.5;
      }

      .result-file {
        color: var(--text-secondary);
        font-weight: 500;
        word-break: break-word;
      }

      .result-stamp {
        margin-top: 6px;
        font-size: 0.75rem;
        color: var(--muted);
        opacity: 0.9;
      }

      button.btn-secondary {
        margin-top: 16px;
        background: rgba(15, 23, 42, 0.35);
        border: 1px solid var(--border);
        color: var(--text-secondary);
        box-shadow: none;
      }

      button.btn-secondary:not(:disabled):hover {
        background: rgba(51, 65, 85, 0.4);
        border-color: var(--border-hover);
        color: var(--text);
        box-shadow: none;
      }

      .muted {
        color: var(--muted);
        font-size: 0.875rem;
      }

      .debug {
        margin-top: 14px;
        color: var(--muted);
        font-size: 0.8125rem;
      }

      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 14px;
      }

      @media (max-width: 520px) {
        body {
          padding: 32px 16px;
        }

        .row {
          flex-direction: column;
        }
      }

      .pill {
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 8px 14px;
        background: rgba(15, 23, 42, 0.35);
        font-size: 0.875rem;
        color: var(--text-secondary);
        transition: border-color var(--transition), background var(--transition);
      }

      .pill:hover {
        border-color: var(--border-hover);
      }

      .status-message {
        font-size: 1rem;
        color: var(--text);
      }

      .result.result--real .status-message {
        color: #ecfdf5;
      }

      .result.result--fake .status-message {
        color: #fef2f2;
      }

      .result.result--default .status-message {
        color: var(--text);
      }

      .preview-wrap {
        margin-top: 16px;
      }

      .preview-wrap[hidden] {
        display: none !important;
      }

      .preview-meta {
        font-size: 0.875rem;
        color: var(--muted);
        margin-bottom: 10px;
        line-height: 1.4;
        word-break: break-word;
      }

      .preview-name {
        color: var(--text-secondary);
        font-weight: 600;
      }

      .preview-video {
        display: block;
        width: 100%;
        max-height: 200px;
        border-radius: var(--radius-md);
        border: 1px solid var(--border);
        background: #0f172a;
        object-fit: contain;
        transition: border-color var(--transition);
      }

      .preview-video:hover {
        border-color: var(--border-hover);
      }

      .loading-row {
        display: flex;
        align-items: center;
        gap: 12px;
        color: var(--text-secondary);
        font-size: 0.9375rem;
      }

      .spinner {
        flex-shrink: 0;
        width: 22px;
        height: 22px;
        border: 2px solid var(--border);
        border-top-color: var(--accent-blue);
        border-radius: 50%;
        animation: spin 0.65s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header class="page-header">
        <h1>RealVision Deepfake Detector</h1>
        <p class="subtitle">
          Upload a video to receive a demo prediction and confidence score (mock output)
        </p>
      </header>

      <section class="card" aria-labelledby="upload-label">
        <form id="predictForm">
          <label id="upload-label" for="videoInput">Choose a video</label>
          <input id="videoInput" name="video" type="file" accept="video/*" />
          <div id="previewWrap" class="preview-wrap" hidden>
            <div id="previewMeta" class="preview-meta"></div>
            <video
              id="previewVideo"
              class="preview-video"
              controls
              playsinline
              preload="metadata"
            ></video>
          </div>
          <button id="submitBtn" type="submit">Upload &amp; Predict</button>
        </form>
      </section>

      <section id="status" class="card status" role="status" aria-live="polite"></section>
    </div>

    <script>
      /** POST target: same origin when served from the app; otherwise hit the local API (file:// or Live Server). */
      function getPredictUrl() {
        if (window.location.protocol === 'file:') {
          return 'http://localhost:3000/api/predict';
        }
        var h = window.location.hostname;
        var p = window.location.port;
        if ((h === 'localhost' || h === '127.0.0.1') && p && p !== '3000') {
          return 'http://localhost:3000/api/predict';
        }
        return '/api/predict';
      }

      const form = document.getElementById('predictForm');
      const videoInput = document.getElementById('videoInput');
      const submitBtn = document.getElementById('submitBtn');
      const statusEl = document.getElementById('status');
      const previewWrap = document.getElementById('previewWrap');
      const previewVideo = document.getElementById('previewVideo');
      const previewMeta = document.getElementById('previewMeta');

      // Object URLs reference the selected File in memory; revoke when discarding so the tab does not leak blob handles.
      let previewObjectUrl = null;

      function revokePreviewUrl() {
        if (previewObjectUrl) {
          URL.revokeObjectURL(previewObjectUrl);
          previewObjectUrl = null;
        }
      }

      function escapeHtml(str) {
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      function formatFileSize(bytes) {
        if (!bytes && bytes !== 0) return '—';
        if (bytes < 1024) return bytes + ' B';
        var u = 1024;
        if (bytes < u * u) return (bytes / u).toFixed(1) + ' KB';
        if (bytes < u * u * u) return (bytes / (u * u)).toFixed(1) + ' MB';
        return (bytes / (u * u * u)).toFixed(1) + ' GB';
      }

      // Drive the local <video> preview from the file input without uploading; createObjectURL bridges File → playable src.
      function syncPreviewFromInput() {
        revokePreviewUrl();
        var file = videoInput.files && videoInput.files[0];
        if (!file) {
          previewWrap.hidden = true;
          previewMeta.textContent = '';
          previewVideo.removeAttribute('src');
          previewVideo.load();
          return;
        }
        previewObjectUrl = URL.createObjectURL(file);
        previewVideo.src = previewObjectUrl;
        previewMeta.innerHTML =
          '<span class="preview-name">' +
          escapeHtml(file.name) +
          '</span> · ' +
          formatFileSize(file.size);
        previewWrap.hidden = false;
      }

      videoInput.addEventListener('change', syncPreviewFromInput);

      // API returns confidence in [0, 1]; accept [0, 100] too so a different backend contract still displays sensibly.
      function toConfidencePercent(value) {
        var n = Number(value);
        if (Number.isNaN(n)) return 0;
        if (n >= 0 && n <= 1) return Math.min(100, Math.max(0, Math.round(n * 100)));
        return Math.min(100, Math.max(0, Math.round(n)));
      }

      // Static, tone-matched copy for the demo explainability panel (not returned by the API).
      function getXaiCopy(tone) {
        if (tone === 'fake') {
          return {
            lead:
              'Several visual cues point to editing or synthesis—small inconsistencies that are easy to miss in a single frame but stand out across the full clip.',
            bullets: [
              'Uneven details around the face or hair where lighting and texture do not line up smoothly',
              'Facial motion or blinking that looks slightly off compared with the rest of the scene',
              'Brief moments where the image looks unnaturally smooth, stretched, or “patched” between frames',
            ],
          };
        }
        if (tone === 'real') {
          return {
            lead:
              'The footage lines up the way we expect from an unaltered video: timing, texture, and movement feel steady and natural from start to finish.',
            bullets: [
              'Expressions and head motion stay believable as angles and lighting change',
              'Background and skin detail stay consistent without sudden jumps or smearing',
              'Rhythm of the clip—pacing, focus, and micro-movements—matches typical authentic recordings',
            ],
          };
        }
        return {
          lead:
            'The system compared a few straightforward signals in your video and leaned toward this outcome based on the clearest overall pattern.',
          bullets: [
            'How faces and motion hold up when the scene or camera moves',
            'Whether faces, lighting, and edges look steady from one moment to the next',
            'General consistency with footage the model usually labels as authentic',
          ],
        };
      }

      function resetDemo() {
        statusEl.style.display = 'none';
        statusEl.className = 'card status';
        statusEl.innerHTML = '';
        videoInput.value = '';
        syncPreviewFromInput();
        videoInput.focus();
      }

      // Centralizes status card updates so loading, errors, and success reuse one DOM surface and class strategy.
      function setStatus({
        kind,
        message,
        prediction,
        confidence,
        debug,
        loading,
        fileName,
        fileSize,
      }) {
        statusEl.style.display = 'block';
        statusEl.className = 'card status';
        // Spinner path: no prediction payload yet, but the card should still announce activity to screen readers.
        if (loading) {
          statusEl.classList.add('status-neutral');
          statusEl.innerHTML =
            '<div class="loading-row" role="status">' +
            '<span class="spinner" aria-hidden="true"></span>' +
            '<span>Analyzing video...</span>' +
            '</div>';
          return;
        }
        if (kind === 'error') statusEl.classList.add('error');
        else if (kind === 'result') {
          statusEl.classList.add('result');
          var p = String(prediction || '')
            .trim()
            .toLowerCase();
          if (p === 'fake') statusEl.classList.add('result--fake');
          else if (p === 'real') statusEl.classList.add('result--real');
          else statusEl.classList.add('result--default');
        } else {
          statusEl.classList.add('status-neutral');
        }

        // Success payload: one template keeps badge tone, bar, XAI, and metadata visually consistent.
        if (prediction !== undefined && confidence !== undefined) {
          var predNorm = String(prediction || '')
            .trim()
            .toLowerCase();
          var tone = predNorm === 'fake' ? 'fake' : predNorm === 'real' ? 'real' : 'default';
          var badgeLabel =
            tone === 'fake' ? 'Fake' : tone === 'real' ? 'Real' : escapeHtml(String(prediction || 'Result'));
          var explain =
            tone === 'fake'
              ? 'High likelihood of manipulation detected'
              : tone === 'real'
                ? 'No strong signs of manipulation detected'
                : 'Analysis complete for this clip.';
          var pct = toConfidencePercent(confidence);
          var sizeLabel = fileSize !== undefined ? formatFileSize(fileSize) : '—';
          var nameHtml = fileName != null ? escapeHtml(fileName) : '—';
          // Narrative bullets follow the same fake/real/default tone as the badge for a coherent “why”.
          var xai = getXaiCopy(tone);
          var xaiBullets = xai.bullets
            .map(function (line) {
              return '<li>' + escapeHtml(line) + '</li>';
            })
            .join('');

          statusEl.innerHTML =
            '<div class="result-outcome">' +
            '<div class="result-badge result-badge--' +
            tone +
            '">' +
            badgeLabel +
            '</div>' +
            '<p class="result-explain">' +
            explain +
            '</p>' +
            '</div>' +
            '<div class="confidence-block">' +
            '<div class="confidence-head">' +
            '<span>Confidence</span>' +
            '<span class="confidence-pct">' +
            pct +
            '%</span>' +
            '</div>' +
            '<div class="progress-track" role="progressbar" aria-valuenow="' +
            pct +
            '" aria-valuemin="0" aria-valuemax="100">' +
            '<div class="progress-fill progress-fill--' +
            tone +
            '" style="width:' +
            pct +
            '%"></div>' +
            '</div>' +
            '</div>' +
            '<div class="xai-section">' +
            '<h3 class="xai-title">Why this prediction?</h3>' +
            '<p class="xai-lead">' +
            escapeHtml(xai.lead) +
            '</p>' +
            '<ul class="xai-list">' +
            xaiBullets +
            '</ul>' +
            '<p class="xai-label">Explanation based on model insights</p>' +
            '</div>' +
            '<div class="result-footer">' +
            '<div class="result-file">' +
            nameHtml +
            ' · ' +
            sizeLabel +
            '</div>' +
            '<div class="result-stamp">Processed just now</div>' +
            '</div>' +
            '<button type="button" class="btn-secondary" id="resetDemoBtn">Analyze another video</button>' +
            (debug ? '<div class="debug">Debug: ' + escapeHtml(String(debug)) + '</div>' : '');

          var resetBtn = document.getElementById('resetDemoBtn');
          if (resetBtn) resetBtn.addEventListener('click', resetDemo);
        } else {
          statusEl.textContent = message || '';
          if (debug) {
            statusEl.innerHTML = statusEl.innerHTML + '<div class="debug">Debug: ' + debug + '</div>';
          }
        }
      }

      // Multipart POST to /api/predict; URL logic covers file:// and dev servers not on :3000.
      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        // Only checks that a file exists here; accept= hints the picker, strict type/size limits are enforced server-side.
        const file = videoInput.files && videoInput.files[0];
        if (!file) {
          setStatus({ kind: 'error', message: 'Please select a video file first.' });
          return;
        }

        // Prevents double submission and pairs with aria-busy for assistive tech during network + upload latency.
        submitBtn.disabled = true;
        submitBtn.setAttribute('aria-busy', 'true');
        setStatus({ loading: true });

        try {
          const formData = new FormData();
          // Field name must match Multer/backend configuration (predict route).
          formData.append('video', file);

          const resp = await fetch(getPredictUrl(), {
            method: 'POST',
            body: formData,
          });

          const data = await resp.json().catch(() => ({}));

          if (!resp.ok) {
            setStatus({
              kind: 'error',
              message: data.message || 'Upload/Inference failed.',
              debug: data.debug,
            });
            return;
          }

          setStatus({
            kind: 'result',
            message: data.message || 'Prediction successful',
            prediction: data.prediction,
            confidence: data.confidence,
            fileName: file.name,
            fileSize: file.size,
            debug: data.debug,
          });
        } catch (err) {
          setStatus({
            kind: 'error',
            message: 'Request failed. Check your server logs and try again.',
          });
        } finally {
          // Early returns in try still run this path, so the button cannot stay disabled after errors or success.
          submitBtn.disabled = false;
          submitBtn.removeAttribute('aria-busy');
        }
      });
    </script>
  </body>
</html>
